  .option-btn.wrong { border-color: #dc3545; background: #f8d7da; }

  .feedback {

  .feedback.wrong { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }

  .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }

  .prev-btn, .next-btn { display: none; padding: 12px 24px; border-radius: 8px;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; }

  .next-btn { background: #0f3460; color: white; border: none; }

  .restart-btn {

r Leads the discussion in Scrum Events or Meetings.<br>Scrum master is Customer who has given the requirements.", "options": [{"label": "A", "text": "All 1, 2 and 3"}, {"label": "B", "text": "only 3"}, {"label": "C", "text": "Both 1 and 2"}, {"label": "D", "text": "Both 1 and 3"}], "answer": "only 3", "answer_label": "B"}, {"id": 6, "question": "Which of the following statements are CORRECT?<br>$(i)$ Scrum Team is a group of 7-10 members with all the skills to develop, test and deliver the working product.<br>$(ii)$ Product Owner is the customer who has given the requirements.", "options": [{"label": "A", "text": "both $(i)$ and $(ii)$"}, {"label": "B", "text": "only $(i)$"}, {"label": "C", "text": "only $(ii)$"}, {"label": "D", "text": "neither $(i)$ nor $(ii)$"}], "answer": "both $(i)$ and $(ii)$", "answer_label": "A"}, {"id": 7, "question": "What will be the output of the code given?<br>public class Test {<br>public static void main(String[] args) {<br>int accounts[] = {101, 1012, 183};<br>System.out.print(\"A\");<br>int accId = accounts[3]; // Line-X<br>System.out.print(\"B\");<br>}<br>}", "options": [{"label": "A", "text": "Prints 'A' and then throw ArrayIndexOutOfBoundsException"}, {"label": "B", "text": "AB"}, {"label": "C", "text": "Compilation Error at Line-X: Unhandled Exception type ArrayIndexOutOfBoundsException"}, {"label": "D", "text": "A ArrayIndexOutOfBoundsException B"}], "answer": "Prints 'A' and then throw ArrayIndexOutOfBoundsException", "answer_label": "A"}, {"id": 8, "question": "What will be the output of the code given below?<br>public class Test {<br>public static void main(String[] args) {<br>int accounts[] = {101, 1012, 103};<br>try {<br>System.out.print(\"A\");<br>int accId = accounts[3];<br>System.out.print(\"B\");<br>} catch(ArrayIndexOutOfBoundsException exception) {<br>System.out.print(\"E1\");<br>} catch(Exception exception) {<br>System.out.print(\"E2\");<br>}<br>}<br>}", "options": [{"label": "A", "text": "AE1"}, {"label": "B", "text": "AE1 B"}, {"label": "C", "text": "A E1 E2"}, {"label": "D", "text": "A E1 B E2"}], "answer": "AE1", "answer_label": "A"}, {"id": 9, "question": "What would be the output of the code given below?<br>public class Test {<br>public static void main(String[] args) {<br>try {<br>test(8);<br>} catch(Exception exception) {<br>System.out.println(\"exception-Main\");<br>}<br>}<br>public static void test(int data) {<br>if (data > 0) {<br>throw new Exception(); // Line-X<br>}<br>System.out.println(\"End Test\");<br>}<br>}", "options": [{"label": "A", "text": "Compilation Error at Line-X: Unhandled exception type Exception"}, {"label": "B", "text": "exception-Main"}, {"label": "C", "text": "End Test"}, {"label": "D", "text": "exception-Main End Test"}], "answer": "Compilation Error at Line-X: Unhandled exception type Exception", "answer_label": "A"}, {"id": 10, "question": "What would be the output of the code given below?<br>public class Demo {<br>public static void main(String[] args) {<br>try {<br>test();<br>} catch(Exception exception) {<br>System.out.println(\"Main Catch\");<br>}<br>}<br>public static void test() { // Line-X<br>try {<br>// ...<br>} finally {<br>throw new RuntimeException(); // Line-Y<br>System.out.println(\"Test Finally\"); // Unreachable<br>}<br>}<br>}", "options": [{"label": "A", "text": "Test Finally \\n Main Catch"}, {"label": "B", "text": "Test Finally"}, {"label": "C", "text": "Compilation Error at Line-Y: Unreachable statement"}, {"label": "D", "text": "Compilation Error at Line-X: missing exception propagation type ArithmeticException"}], "answer": "Compilation Error at Line-Y: Unreachable statement", "answer_label": "C"}, {"id": 11, "question": "Identify the CORRECT statement with respect to List and Set.<br>$(i)$ The data inserted in List will be in sorted order always<br>$(ii)$ Set allows to insert duplicate values", "options": [{"label": "A", "text": "only $(i)$"}, {"label": "B", "text": "both $(i)$ and $(ii)$"}, {"label": "C", "text": "only $(ii)$"}, {"label": "D", "text": "neither $(i)$ nor $(ii)$"}], "answer": "neither $(i)$ nor $(ii)$", "answer_label": "D"}, {"id": 12, "question": "What will be the output of the code given below? Assume that all required classes and interfaces are imported.<br>Map<Integer, Integer> myMap = new TreeMap<Integer, Integer>();<br>myMap.put(16, 150);<br>myMap.put(30, 25);<br>myMap.put(20, 50);<br>Set<Integer> keySet = myMap.keySet();<br>for (Integer key: keySet) {<br>System.out.print(myMap.get(key) + \" \");<br>}", "options": [{"label": "A", "text": "150 50 25"}, {"label": "B", "text": "150 25 50"}, {"label": "C", "text": "25 50 150"}, {"label": "D", "text": "50 25 150"}], "answer": "150 50 25", "answer_label": "A"}, {"id": 13, "question": "What will be the output of the code given? Assume that all required classes and interfaces are imported.<br>Set<Integer> mySet = new TreeSet<Integer>();<br>mySet.add(10);<br>mySet.add(3);<br>mySet.add(20);<br>for (Integer data: mySet) {<br>mySet.add(3);<br>System.out.print(data + \" \");<br>}", "options": [{"label": "A", "text": "3 10 20 (Standard academic/conceptual key answer)"}, {"label": "B", "text": "10 3 20"}, {"label": "C", "text": "20 10 3"}, {"label": "D", "text": "10 3 20 3"}], "answer": "3 10 20 (Standard academic/conceptual key answer)", "answer_label": "A"}, {"id": 14, "question": "Which of the following are methods of Thread class? [Choose 2]", "options": [{"label": "A", "text": "start"}, {"label": "B", "text": "wait()"}, {"label": "C", "text": "sleep"}, {"label": "D", "text": "notify()"}], "answer": "start", "answer_label": "A"}, {"id": 15, "question": "Which of the following is CORRECT way to create Thread?<br>$(i)$ Create a class by extending Thread class and override run() method<br>$(ii)$ Create a class by implementing Runnable interface and defining start() method in it", "options": [{"label": "A", "text": "both $(i)$ and $(ii)$"}, {"label": "B", "text": "only $(i)$"}, {"label": "C", "text": "only $(ii)$"}, {"label": "D", "text": "neither $(i)$ nor $(ii)$"}], "answer": "only $(i)$", "answer_label": "B"}, {"id": 16, "question": "Which of the following is/are the CORRECT declaration of Functional interface?<br>$(i)$<br>interface TestInterface {<br>public void add(int num1, int num2);<br>public default String display(String name) { return null; }<br>}<br>$(ii)$<br>@FunctionalInterface<br>interface TestInterface {<br>public void add(int num1, int num2);<br>public static String display(String name) { return null; }<br>}", "options": [{"label": "A", "text": "both $(i)$ and $(ii)$"}, {"label": "B", "text": "only $(i)$"}, {"label": "C", "text": "only $(ii)$"}, {"label": "D", "text": "neither $(i)$ nor $(ii)$"}], "answer": "both $(i)$ and $(ii)$", "answer_label": "A"}, {"id": 17, "question": "Which of the following code can be placed at Line-X so that the code displays the output as \"Java\"? [Choose 2]<br>interface TestInterface {<br>void display(String message);<br>}<br>public class Demo1 {<br>public static void main(String[] args) {<br>// Line-X<br>obj.display(\"Java\");<br>}<br>}", "options": [{"label": "A", "text": "TestInterface obj = (message) -> System.out.println(message);"}, {"label": "B", "text": "TestInterface obj = (String message) -> System.out.println(message);"}, {"label": "C", "text": "TestInterface obj = new TestInterface(String message) -> System.out.println(message);"}, {"label": "D", "text": "TestInterface obj = new TestInterface (message) -> System.out.println(message);"}], "answer": "TestInterface obj = (message) -> System.out.println(message);", "answer_label": "A"}, {"id": 18, "question": "Which of the following should be placed at Line-X so that the perform() method is executed only once irrespective of number of invocations of serviceTest1() and serviceTest2() methods?", "options": [{"label": "A", "text": "@AfterAll"}, {"label": "B", "text": "@BeforeAll"}, {"label": "C", "text": "@TestAfterAll"}, {"label": "D", "text": "@TestBeforeAll"}], "answer": "@BeforeAll", "answer_label": "B"}, {"id": 19, "question": "Which of the following annotation is used to read the values from CSV FILE for parameterized test?", "options": [{"label": "A", "text": "@CsvSource"}, {"label": "B", "text": "@CsvFileSource"}, {"label": "C", "text": "@CsvFileValueSource"}, {"label": "D", "text": "@CsvValueSource"}], "answer": "@CsvFileSource", "answer_label": "B"}, {"id": 20, "question": "____________ represents the table along with data in the database.", "options": [{"label": "A", "text": "Statement"}, {"label": "B", "text": "Result"}, {"label": "C", "text": "ResultSet"}, {"label": "D", "text": "Connection"}], "answer": "ResultSet", "answer_label": "C"}, {"id": 21, "question": "Which of the following interfaces in JDBC can be used to execute SQL statements? [Choose 2]", "options": [{"label": "A", "text": "Statement"}, {"label": "B", "text": "PreparedStatement"}, {"label": "C", "text": "ResultSet"}, {"label": "D", "text": "PrepareStatement"}], "answer": "Statement", "answer_label": "A"}, {"id": 22, "question": "Identify the CORRECT code which needs to be written to update salary to 500.75 for employee whose employeeId is 1001.<br>UPDATE employee SET salary=? WHERE employeeId=?", "options": [{"label": "A", "text": "pstmt.setDouble(1, 500.75); \\n pstmt.setInt(2, 1001); \\n pstmt.executeUpdate();"}, {"label": "B", "text": "pstmt.setInt(1, 1001); \\n pstmt.setDouble(2, 500.75); \\n pstmt.executeUpdate();"}, {"label": "C", "text": "pstmt.setInt(2, 1001); \\n pstmt.setDouble(1, 500.75); \\n pstmt.executeQuery();"}, {"label": "D", "text": "pstmt.setInt(1, 1001); \\n pstmt.setDouble(2, 500.75); \\n pstmt.Update();"}], "answer": "pstmt.setDouble(1, 500.75); \\n pstmt.setInt(2, 1001); \\n pstmt.executeUpdate();", "answer_label": "A"}, {"id": 23, "question": "Which of the following is/are CORRECT statement(s)?<br>$(i)$ JDBC driver is Database dependent<br>$(ii)$ JDBC has in built driver to connect to database", "options": [{"label": "A", "text": "both $(i)$ let currentIdx = 0;
let answered = [];
let quizDone = false;

const qNum = document.getElementById('qNum');
const qText = document.getElementById('qText');
const options = document.getElementById('options');
const feedback = document.getElementById('feedback');
const feedbackMsg = document.getElementById('feedbackMsg');
const feedbackAnswer = document.getElementById('feedbackAnswer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const scoreEl = document.getElementById('score');
const quizContent = document.getElementById('quizContent');
const results = document.getElementById('results');
const finalScore = document.getElementById('finalScore');
const finalPct = document.getElementById('finalPct');
const summary = document.getElementById('summary');
const restartBtn = document.getElementById('restartBtn');

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatText(s) {
  return (s || '').split(/<br>/gi).map(function(p) {
    return escapeHtml(p).replace(/`([^`]+)`/g, '<code>$1</code>');
  }).join('<br>');
}

function calcScore() {
  return answered.filter(function(a) { return a && a.correct; }).length;
}

function updateScore() {
  scoreEl.textContent = calcScore();
}

function renderQuestion() {
  if (quizDone) return;
  var q = QUESTIONS[currentIdx];
  qNum.textContent = 'Question ' + (currentIdx + 1) + ' of 63';
  qText.innerHTML = formatText(q.question);

  options.innerHTML = '';
  q.options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="label">' + opt.label + '</span><span>' + formatText(opt.text) + '</span>';
    btn.dataset.index = i;
    btn.addEventListener('click', function() { selectOption(i); });
    options.appendChild(btn);
  });

  feedback.classList.remove('show', 'correct', 'wrong');
  prevBtn.classList.remove('show');
  nextBtn.classList.remove('show');
  progressBar.style.width = ((currentIdx + 1) / 63 * 100) + '%';

  if (answered[currentIdx] !== undefined) {
    applyAnswerState();
  }
  if (currentIdx > 0) prevBtn.classList.add('show');
}

function applyAnswerState() {
  var state = answered[currentIdx];
  if (!state) return;
  var q = QUESTIONS[currentIdx];
  var btns = options.querySelectorAll('.option-btn');
  btns.forEach(function(btn, i) {
    btn.classList.remove('correct', 'wrong');
    if (q.options[i].label === q.answer_label) btn.classList.add('correct');
  });
  if (state.selectedLabel !== q.answer_label) {
    btns[state.selectedIdx].classList.add('wrong');
  }
  showFeedback(state.correct);
  nextBtn.textContent = (currentIdx === 63 - 1) ? 'Finish' : 'Next';
  nextBtn.classList.add('show');
}

function selectOption(idx) {
  var q = QUESTIONS[currentIdx];
  var btns = options.querySelectorAll('.option-btn');
  var selectedLabel = q.options[idx].label;
  var isCorrect = selectedLabel === q.answer_label;

  answered[currentIdx] = { selectedLabel: selectedLabel, selectedIdx: idx, correct: isCorrect };

  btns.forEach(function(btn, i) {
    btn.classList.remove('correct', 'wrong');
    if (q.options[i].label === q.answer_label) btn.classList.add('correct');
  });
  if (!isCorrect) btns[idx].classList.add('wrong');

  updateScore();
  showFeedback(isCorrect);
  nextBtn.textContent = (currentIdx === 63 - 1) ? 'Finish' : 'Next';
  nextBtn.classList.add('show');
}

function showFeedback(isCorrect) {
  var q = QUESTIONS[currentIdx];
  feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  feedbackMsg.textContent = isCorrect ? 'Correct!' : 'Wrong!';
  feedbackAnswer.innerHTML = '<strong>Answer: ' + q.answer_label + ') </strong>' + formatText(q.answer);
}

prevBtn.addEventListener('click', function() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
});

nextBtn.addEventListener('click', function() {
  if (currentIdx < 63 - 1) { currentIdx++; renderQuestion(); }
  else { showResults(); }
});

function showResults() {
  quizDone = true;
  quizContent.classList.add('hidden');
  results.classList.add('show');
  progressBar.style.width = '100%';
  var s = calcScore();
  finalScore.textContent = s;
  var pct = Math.round(s / 63 * 100);
  finalPct.textContent = pct + '%';
  var html = '<h3 style="margin-bottom:12px">Review Answers</h3>';
  QUESTIONS.forEach(function(q, i) {
    var a = answered[i];
    var status = a && a.correct ? '\u2705' : '\u274C';
    var label = a ? a.selectedLabel : '-';
    var shortQ = q.question.replace(/<br>/gi, ' ').slice(0, 80);
    html += '<div class="summary-item"><span class="sq-status">' + status + '</span><span class="sq-num">Q' + (i+1) + ':</span> ' + escapeHtml(shortQ) + (q.question.replace(/<br>/gi, ' ').length > 80 ? '...' : '') + ' <em>(Your answer: ' + label + ', Correct: ' + q.answer_label + ')</em></div>';
  });
  summary.innerHTML = html;
}

restartBtn.addEventListener('click', function() {
  currentIdx = 0;
  answered = [];
  quizDone = false;
  scoreEl.textContent = '0';
  results.classList.remove('show');
  quizContent.classList.remove('hidden');
  renderQuestion();
});

renderQuestion();
</script>
