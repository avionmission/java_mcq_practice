<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java MCQ Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center;
    padding: 20px; color: #1a1a2e;
  }
  .container { width: 100%; max-width: 720px; }
  .tabs {
    display: flex; gap: 0; background: #16213e; border-radius: 12px 12px 0 0;
    overflow: hidden;
  }
  .tab {
    flex: 1; padding: 14px 20px; border: none; background: transparent;
    color: rgba(255,255,255,0.5); font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.15s ease; border-bottom: 3px solid transparent;
  }
  .tab:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }
  .tab.active { color: white; border-bottom-color: #0f3460; background: #1a1a2e; }
  .header {
    background: #1a1a2e; color: white; padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .subtitle { font-size: 13px; color: rgba(255,255,255,0.6); }
  .score { font-size: 15px; background: #16213e; padding: 5px 12px; border-radius: 20px; }
  .progress-wrap { background: #e9ecef; height: 6px; }
  .progress-bar { height: 100%; background: #0f3460; transition: width 0.3s ease; width: 0%; }
  .card {
    background: white; border-radius: 0 0 12px 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 28px 24px 24px;
  }
  .q-num { font-size: 13px; color: #6c757d; margin-bottom: 10px; font-weight: 500; }
  .q-text {
    font-size: 17px; line-height: 1.6; margin-bottom: 24px; font-weight: 500;
  }
  .q-text code, .answer-text code { background: #eef1ff; padding: 1px 5px; border-radius: 4px; font-size: 0.9em; font-family: 'Courier New', monospace; }
  .q-text pre { background: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 14px; overflow-x: auto; margin: 8px 0; line-height: 1.5; border: 1px solid #eee; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
    border: 2px solid #dee2e6; border-radius: 10px; background: white;
    font-size: 15px; cursor: pointer; transition: all 0.15s ease; text-align: left;
    line-height: 1.5; width: 100%;
  }
  .option-btn:hover { border-color: #0f3460; background: #f8f9ff; }
  .option-btn .label {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: #e9ecef; display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; transition: all 0.15s ease;
  }
  .option-btn.correct { border-color: #28a745; background: #d4edda; }
  .option-btn.correct .label { background: #28a745; color: white; }
  .option-btn.wrong { border-color: #dc3545; background: #f8d7da; }
  .option-btn.wrong .label { background: #dc3545; color: white; }
  .feedback {
    margin-top: 20px; padding: 14px 18px; border-radius: 10px;
    font-size: 15px; line-height: 1.5; display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
  .feedback.wrong { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
  .feedback .answer-text { margin-top: 5px; }
  .feedback .answer-text code { background: rgba(0,0,0,0.06); }
  .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
  .nav-left, .nav-right { display: flex; gap: 10px; }
  .prev-btn, .next-btn { display: none; padding: 12px 24px; border-radius: 8px;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; }
  .prev-btn.show, .next-btn.show { display: inline-block; }
  .prev-btn { background: white; color: #0f3460; border: 2px solid #0f3460; }
  .prev-btn:hover { background: #f0f2f5; }
  .next-btn { background: #0f3460; color: white; border: none; }
  .next-btn:hover { background: #1a1a2e; }
  .results {
    display: none; text-align: center; padding: 20px 0;
  }
  .results.show { display: block; }
  .results h2 { font-size: 28px; margin-bottom: 8px; }
  .results .score-big { font-size: 56px; font-weight: 700; color: #0f3460; margin: 16px 0; }
  .results .score-big .total { font-size: 28px; color: #6c757d; }
  .results .pct { font-size: 18px; color: #6c757d; margin-bottom: 24px; }
  .results .summary { text-align: left; margin-top: 16px; }
  .results .summary-item {
    padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 14px;
  }
  .results .summary-item:last-child { border-bottom: none; }
  .results .summary-item .sq-num { font-weight: 600; color: #0f3460; }
  .results .summary-item .sq-status { display: inline-block; margin-right: 6px; }
  .restart-btn {
    margin-top: 20px; padding: 12px 32px; border: 2px solid #0f3460;
    border-radius: 8px; background: white; color: #0f3460;
    font-size: 16px; font-weight: 500; cursor: pointer;
  }
  .restart-btn:hover { background: #f0f2f5; }
  .quiz-content { display: block; }
  .quiz-content.hidden { display: none; }
  @media (max-width: 500px) {
    body { padding: 10px; }
    .header { padding: 14px 16px; }
    .header h1 { font-size: 16px; }
    .tab { font-size: 13px; padding: 12px 10px; }
    .card { padding: 20px 16px; }
    .q-text { font-size: 15px; }
    .option-btn { padding: 12px 14px; font-size: 14px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="1">Quiz 1: Java MCQs</button>
    <button class="tab" data-tab="2">Quiz 2: FSE Main Test</button>
  </div>
  <div class="header">
    <div>
      <h1 id="quizTitle">Java MCQ Quiz</h1>
      <div class="subtitle" id="quizSubtitle">71 questions - Java/JPA/JDBC/Spring</div>
    </div>
    <div class="score">Score: <span id="score">0</span> / <span id="total">71</span></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="card">
    <div id="quizContent" class="quiz-content">
      <div class="q-num" id="qNum">Question 1 of 71</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div id="feedbackMsg"></div>
        <div class="answer-text" id="feedbackAnswer"></div>
      </div>
      <div class="nav-buttons">
        <div class="nav-left"><button class="prev-btn" id="prevBtn">Previous</button></div>
        <div class="nav-right"><button class="next-btn" id="nextBtn">Next</button></div>
      </div>
    </div>
    <div class="results" id="results">
      <h2>Quiz Complete!</h2>
      <div class="score-big"><span id="finalScore">0</span><span class="total"> / 71</span></div>
      <div class="pct" id="finalPct">0%</div>
      <div class="summary" id="summary"></div>
      <button class="restart-btn" id="restartBtn">Restart Quiz</button>
    </div>
  </div>
</div>
<script>
var QUIZZES = {
  1: [{"id": 1, "question": "Choose the disadvantage of the thin driver from the below options:", "options": [{"label": "A", "text": "Poor performance than all other drivers"}, {"label": "B", "text": "Software installation is required in server or client side"}, {"label": "C", "text": "It is dependent on the database"}, {"label": "D", "text": "It is partially written in Java"}], "answer": "It is dependent on the database", "answer_label": "C"}, {"id": 2, "question": "Suresh, a marketing executive, wants to create a customer report on a monthly basis. He wants to iterate the records from the customer table faster. Help him to select the appropriate interface for this situation.", "options": [{"label": "A", "text": "Statement"}, {"label": "B", "text": "PreparedStatement"}, {"label": "C", "text": "CallableStatement"}, {"label": "D", "text": "ResultSet"}], "answer": "PreparedStatement", "answer_label": "B"}, {"id": 3, "question": "Choose from the following CORRECT statements about the `Class.forName()` method call: I. This method is used for dynamically loading the driver's class file into memory. II. It is mandatory from JDBC 4.0 onwards. III. It returns an instance of `java.lang.Class`.", "options": [{"label": "A", "text": "I and III only"}, {"label": "B", "text": "I and II only"}, {"label": "C", "text": "II and III only"}, {"label": "D", "text": "All of the above"}], "answer": "I and III only", "answer_label": "A"}, {"id": 4, "question": "Which of the following lines of code is used to register a MySQL driver using the `DriverManager` class?", "options": [{"label": "A", "text": "`DriverManager.registerDriver(new com.mysql.cj.jdbc.Driver());`"}, {"label": "B", "text": "`DriverManager.getDriver(\"jdbc:mysql://localhost:3306/db\");`"}, {"label": "C", "text": "`Class.forName(\"com.mysql.cj.jdbc.Driver\");`"}, {"label": "D", "text": "Both A and C"}], "answer": "Both A and C", "answer_label": "D"}, {"id": 5, "question": "Which method is used to execute a SQL `DELETE` statement that removes records from a database table?", "options": [{"label": "A", "text": "`executeQuery()`"}, {"label": "B", "text": "`executeUpdate()`"}, {"label": "C", "text": "`executeDelete()`"}, {"label": "D", "text": "`executeModifier()`"}], "answer": "`executeUpdate()", "answer_label": "B"}, {"id": 6, "question": "Which entity state represents an object that has a persistent identity but is no longer associated with an active persistence context?", "options": [{"label": "A", "text": "New / Transient"}, {"label": "B", "text": "Managed"}, {"label": "C", "text": "Detached"}, {"label": "D", "text": "Removed"}], "answer": "Detached", "answer_label": "C"}, {"id": 7, "question": "Identify the JPA specification provider from the given options:", "options": [{"label": "A", "text": "Hibernate"}, {"label": "B", "text": "EclipseLink"}, {"label": "C", "text": "OpenJPA"}, {"label": "D", "text": "All of the above"}], "answer": "All of the above", "answer_label": "D"}, {"id": 8, "question": "What is the function of the `EntityManagerFactory` in JPA?", "options": [{"label": "A", "text": "To manage individual entity lifecycles"}, {"label": "B", "text": "To interact with the database context directly"}, {"label": "C", "text": "To create and configure instances of `EntityManager`"}, {"label": "D", "text": "To execute JPQL queries directly"}], "answer": "To create and configure instances of `EntityManager", "answer_label": "C"}, {"id": 9, "question": "Which method is used to transfer a detached entity back into a managed state within a new transaction context?", "options": [{"label": "A", "text": "`persist()`"}, {"label": "B", "text": "`merge()`"}, {"label": "C", "text": "`refresh()`"}, {"label": "D", "text": "`flush()`"}], "answer": "`merge()", "answer_label": "B"}, {"id": 10, "question": "Which annotation is used to specify that multiple named queries can be defined on a single entity class?", "options": [{"label": "A", "text": "`@NamedQuery`"}, {"label": "B", "text": "`@NamedQueries`"}, {"label": "C", "text": "`@QueryRepository`"}, {"label": "D", "text": "`@Queries`"}], "answer": "`@NamedQueries", "answer_label": "B"}, {"id": 11, "question": "In JPQL, which clause is used to filter out records based on aggregate conditions?", "options": [{"label": "A", "text": "`WHERE`"}, {"label": "B", "text": "`HAVING`"}, {"label": "C", "text": "`GROUP BY`"}, {"label": "D", "text": "`ORDER BY`"}], "answer": "`HAVING", "answer_label": "B"}, {"id": 12, "question": "When an entity is in the \"Removed\" state, when is it actually deleted from the underlying database table?", "options": [{"label": "A", "text": "Immediately when `remove()` is called"}, {"label": "B", "text": "When the transaction commits or `flush()` is invoked"}, {"label": "C", "text": "When the entity becomes detached"}, {"label": "D", "text": "When the JVM garbage collector runs"}], "answer": "When the transaction commits or `flush()` is invoked", "answer_label": "B"}, {"id": 13, "question": "What is the fundamental purpose of Unit Testing in a software application?", "options": [{"label": "A", "text": "To test the integration between multiple third-party systems"}, {"label": "B", "text": "To isolate and verify the correctness of the smallest testable units of code"}, {"label": "C", "text": "To perform load testing and performance benchmarks"}, {"label": "D", "text": "To evaluate user interface designs"}], "answer": "To isolate and verify the correctness of the smallest testable units of code", "answer_label": "B"}, {"id": 14, "question": "In JUnit 5, what happens if an Assumption fails during execution (e.g., using `assumeTrue()`)?", "options": [{"label": "A", "text": "The test fails and throws an AssertionError"}, {"label": "B", "text": "The test is aborted and skipped without failing the build"}, {"label": "C", "text": "The entire test suite terminates unexpectedly"}, {"label": "D", "text": "The test continues to execute standard assertions"}], "answer": "The test is aborted and skipped without failing the build", "answer_label": "B"}, {"id": 15, "question": "Which assertion in JUnit 5 verifies that an execution completes before a given timeout duration has expired?", "options": [{"label": "A", "text": "`assertTimeout()`"}, {"label": "B", "text": "`assertTimeLimit()`"}, {"label": "C", "text": "`assertDuration()`"}, {"label": "D", "text": "`assertPreemptively()`"}], "answer": "`assertTimeout()", "answer_label": "A"}, {"id": 16, "question": "Which HTML tag is used to reference and link an external Cascading Style Sheet (CSS) file to an HTML document?", "options": [{"label": "A", "text": "`<style src=\"...\">`"}, {"label": "B", "text": "`<link rel=\"stylesheet\" href=\"...\">`"}, {"label": "C", "text": "`<script type=\"css\" src=\"...\">`"}, {"label": "D", "text": "`<css href=\"...\">`"}], "answer": "`<link rel=\"stylesheet\" href=\"...\">", "answer_label": "B"}, {"id": 17, "question": "Which HTTP method is preferred for submitting form data that contains sensitive user credentials like passwords?", "options": [{"label": "A", "text": "GET"}, {"label": "B", "text": "POST"}, {"label": "C", "text": "OPTIONS"}, {"label": "D", "text": "HEAD"}], "answer": "POST", "answer_label": "B"}, {"id": 18, "question": "Which built-in JavaScript function is used to parse a string representation of an integer and convert it into a numeric data type?", "options": [{"label": "A", "text": "`parseInteger()`"}, {"label": "B", "text": "`parseInt()`"}, {"label": "C", "text": "`Number.toInteger()`"}, {"label": "D", "text": "`convertToMin()`"}], "answer": "`parseInt()", "answer_label": "B"}, {"id": 19, "question": "In JavaScript, how do you dynamically change the background color of an HTML element with an id of `main-box` to light gray?", "options": [{"label": "A", "text": "`document.getElementById(\"main-box\").style.backgroundColor = \"#D3D3D3\";`"}, {"label": "B", "text": "`document.getElementById(\"main-box\").className = \"bg-color\";`"}, {"label": "C", "text": "`document.getElementByName(\"main-box\").background = \"#D3D3D3\";`"}, {"label": "D", "text": "`document.select(\"main-box\").color = \"gray\";`"}], "answer": "`document.getElementById(\"main-box\").style.backgroundColor = \"#D3D3D3\";", "answer_label": "A"}, {"id": 20, "question": "What is the purpose of the `alert()` function in JavaScript?", "options": [{"label": "A", "text": "To print messages directly to the browser console log"}, {"label": "B", "text": "To display a modal dialog box with a specified message and an OK button"}, {"label": "C", "text": "To prompt the user to input data values"}, {"label": "D", "text": "To throw a critical runtime application exception"}], "answer": "To display a modal dialog box with a specified message and an OK button", "answer_label": "B"}, {"id": 21, "question": "Which configuration string represents a valid connection URL format for connecting to a local MySQL database instance using JDBC?", "options": [{"label": "A", "text": "`jdbc:mysql://localhost:3306/emp`"}, {"label": "B", "text": "`jdbc/mysql://localhost:3306/emp`"}, {"label": "C", "text": "`mysql:jdbc://localhost/emp:3306`"}, {"label": "D", "text": "`jdbc:mysql:3306://localhost/emp`"}], "answer": "`jdbc:mysql://localhost:3306/emp", "answer_label": "A"}, {"id": 22, "question": "Which method of the `ResultSetMetaData` interface determines whether a specific column can be used in a SQL `WHERE` clause search?", "options": [{"label": "A", "text": "`isSearchable(int column)`"}, {"label": "B", "text": "`isFilterable(int column)`"}, {"label": "C", "text": "`isSelectable(int column)`"}, {"label": "D", "text": "`isConditionable(int column)`"}], "answer": "`isSearchable(int column)", "answer_label": "A"}, {"id": 23, "question": "Which design pattern is primarily used by the Java Database Connectivity (JDBC) API to locate and load matching database vendor drivers dynamically?", "options": [{"label": "A", "text": "Factory Pattern"}, {"label": "B", "text": "Service Locator / DriverManager Pattern"}, {"label": "C", "text": "Singleton Pattern"}, {"label": "D", "text": "Adapter Pattern"}], "answer": "Service Locator / DriverManager Pattern", "answer_label": "B"}, {"id": 24, "question": "In a JPQL query, what is the correct syntax to sort the records retrieved from an `Employee` entity by their `salary` attribute in descending order?", "options": [{"label": "A", "text": "`SELECT e FROM Employee e ORDER BY e.salary DESC`"}, {"label": "B", "text": "`SELECT e FROM Employee e SORT BY e.salary DOWN`"}, {"label": "C", "text": "`FROM Employee e ORDERING e.salary DESCENDING`"}, {"label": "D", "text": "`SELECT e FROM Employee e ORDER e.salary DESC`"}], "answer": "`SELECT e FROM Employee e ORDER BY e.salary DESC", "answer_label": "A"}, {"id": 25, "question": "When setting an integer value on a `PreparedStatement` placeholder index, which method should be called to avoid type-mismatch compilation errors?", "options": [{"label": "A", "text": "`setInt(int parameterIndex, int x)`"}, {"label": "B", "text": "`setInteger(int parameterIndex, int x)`"}, {"label": "C", "text": "`setNumeric(int parameterIndex, int x)`"}, {"label": "D", "text": "`setVal(int parameterIndex, int x)`"}], "answer": "`setInt(int parameterIndex, int x)", "answer_label": "A"}, {"id": 26, "question": "Which JPA annotation maps a clean, unidirectional association where an entity points to a collection/array of child entity objects?", "options": [{"label": "A", "text": "`@OneToMany`"}, {"label": "B", "text": "`@ManyToOne`"}, {"label": "C", "text": "`@ManyToMany`"}, {"label": "D", "text": "`@OneToOne`"}], "answer": "`@OneToMany", "answer_label": "A"}, {"id": 27, "question": "What fundamental constraint applies to all well-formed XML instance documents?", "options": [{"label": "A", "text": "It must contain exactly one root element enclosing all other elements."}, {"label": "B", "text": "It must contain a reference to a DTD or XML Schema."}, {"label": "C", "text": "All tag names must be written entirely in uppercase."}, {"label": "D", "text": "Attributes must precede element declarations."}], "answer": "It must contain exactly one root element enclosing all other elements.", "answer_label": "A"}, {"id": 28, "question": "Which XSLT directive is explicitly used to iterate over a selected node-set collection and apply transformation rules repeatedly?", "options": [{"label": "A", "text": "`<xsl:for-each>`"}, {"label": "B", "text": "`<xsl:loop>`"}, {"label": "C", "text": "`<xsl:iterate>`"}, {"label": "D", "text": "`<xsl:repeat>`"}], "answer": "`<xsl:for-each>", "answer_label": "A"}, {"id": 29, "question": "In an XSL template matching routine, which character or path token represents the current node context inside an expression?", "options": [{"label": "A", "text": "`.`"}, {"label": "B", "text": "`*`"}, {"label": "C", "text": "`//`"}, {"label": "D", "text": "`@`"}], "answer": "`.", "answer_label": "A"}, {"id": 30, "question": "Which JUnit 5 lifecycle annotation guarantees that the annotated target method runs exactly once before *all* individual test methods execution in the current class file?", "options": [{"label": "A", "text": "`@BeforeAll`"}, {"label": "B", "text": "`@BeforeEach`"}, {"label": "C", "text": "`@BeforeClass`"}, {"label": "D", "text": "`@SetUpAll`"}], "answer": "`@BeforeAll", "answer_label": "A"}, {"id": 31, "question": "Which annotation should be applied to a JUnit 5 test method to temporarily deactivate or ignore it during a continuous integration build runner process?", "options": [{"label": "A", "text": "`@Disabled`"}, {"label": "B", "text": "`@Ignore`"}, {"label": "C", "text": "`@Skip`"}, {"label": "D", "text": "`@TransientTest`"}], "answer": "`@Disabled", "answer_label": "A"}, {"id": 32, "question": "What JUnit 5 standard annotation permits developers to organize and filter tests into distinct execution buckets like \"Production\" or \"Development\"?", "options": [{"label": "A", "text": "`@Tag`"}, {"label": "B", "text": "`@Category`"}, {"label": "C", "text": "`@Group`"}, {"label": "D", "text": "`@Type`"}], "answer": "`@Tag", "answer_label": "A"}, {"id": 33, "question": "What occurs at runtime if a JUnit 5 assertion fails inside a test method context?", "options": [{"label": "A", "text": "An `AssertionError` is thrown, halting execution of that test method, and marking it as \"Failed\"."}, {"label": "B", "text": "The entire JVM terminates unexpectedly."}, {"label": "C", "text": "The test method continues executing remaining assertions normally."}, {"label": "D", "text": "The test is quietly skipped and logged as a success."}], "answer": "An `AssertionError` is thrown, halting execution of that test method, and marking it as \"Failed\".", "answer_label": "A"}, {"id": 34, "question": "Which standard database driver category defines the \"Thin Driver\", which is implemented entirely in Java and communicates directly with the database using network protocols?", "options": [{"label": "A", "text": "Type 4"}, {"label": "B", "text": "Type 3"}, {"label": "C", "text": "Type 2"}, {"label": "D", "text": "Type 1"}], "answer": "Type 4", "answer_label": "A"}, {"id": 35, "question": "Which object manages the tracking and connection lifecycle of registered JDBC database drivers?", "options": [{"label": "A", "text": "`DriverManager`"}, {"label": "B", "text": "`ConnectionRegistry`"}, {"label": "C", "text": "`DriverContext`"}, {"label": "D", "text": "`StatementFactory`"}], "answer": "`DriverManager", "answer_label": "A"}, {"id": 36, "question": "Which Spring Core stereotype annotation marks a class file as an explicitly managed repository component handling database interaction capabilities?", "options": [{"label": "A", "text": "`@Repository`"}, {"label": "B", "text": "`@Component`"}, {"label": "C", "text": "`@Service`"}, {"label": "D", "text": "`@Store`"}], "answer": "`@Repository", "answer_label": "A"}, {"id": 37, "question": "Which Spring Data annotation forces a dynamic JPQL query method to execute as a write/update operation rather than a read-only selection?", "options": [{"label": "A", "text": "`@Modifying`"}, {"label": "B", "text": "`@Update`"}, {"label": "C", "text": "`@Mutate`"}, {"label": "D", "text": "`@Transaction`"}], "answer": "`@Modifying", "answer_label": "A"}, {"id": 38, "question": "What Hibernate property configuration directive controls the automatic creation, updates, or dropping of physical database schemas upon application initialization?", "options": [{"label": "A", "text": "`hibernate.hbm2ddl.auto`"}, {"label": "B", "text": "`hibernate.schema.strategy`"}, {"label": "C", "text": "`hibernate.db.ddl`"}, {"label": "D", "text": "`jpa.generate-ddl`"}], "answer": "`hibernate.hbm2ddl.auto", "answer_label": "A"}, {"id": 39, "question": "Which JPA annotation strategy supports embedding composite primary keys inside a unified class definition file?", "options": [{"label": "A", "text": "`@EmbeddedId`"}, {"label": "B", "text": "`@IdClass`"}, {"label": "C", "text": "`@CompositeKey`"}, {"label": "D", "text": "Both A and B"}], "answer": "Both A and B", "answer_label": "D"}, {"id": 40, "question": "Which Spring annotation resolves conflicts when multiple beans of the exact same data type exist within the IoC context, pointing to the target identity?", "options": [{"label": "A", "text": "`@Qualifier`"}, {"label": "B", "text": "`@Primary`"}, {"label": "C", "text": "`@Resolve`"}, {"label": "D", "text": "`@InjectNamed`"}], "answer": "`@Qualifier", "answer_label": "A"}, {"id": 41, "question": "What default database connection pool does Spring Boot automatically configure out-of-the-box for production-ready applications?", "options": [{"label": "A", "text": "HikariCP"}, {"label": "B", "text": "Tomcat DBCP"}, {"label": "C", "text": "Commons DBCP2"}, {"label": "D", "text": "C3P0"}], "answer": "HikariCP", "answer_label": "A"}, {"id": 42, "question": "Which method should be called on an active transaction instance to commit structural modifications to the database?", "options": [{"label": "A", };

var TOTALS = { 1: 71, 2: 63 };
var TITLES = { 1: 'Quiz 1: Java MCQ', 2: 'Quiz 2: FSE Main Test' };
var SUBTITLES = { 1: '71 questions - Java/JPA/JDBC/Spring', 2: '63 questions - JSP/Scrum/Spring/Eureka' };

var activeTab = 1;
var state = {
  1: { currentIdx: 0, answered: [], quizDone: false },
  2: { currentIdx: 0, answered: [], quizDone: false }
};

var QUESTIONS = QUIZZES[1];
var currentIdx = 0;
var answered = [];
var quizDone = false;

var qNum = document.getElementById('qNum');
var qText = document.getElementById('qText');
var options = document.getElementById('options');
var feedback = document.getElementById('feedback');
var feedbackMsg = document.getElementById('feedbackMsg');
var feedbackAnswer = document.getElementById('feedbackAnswer');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');
var progressBar = document.getElementById('progressBar');
var scoreEl = document.getElementById('score');
var totalEl = document.getElementById('total');
var quizTitle = document.getElementById('quizTitle');
var quizSubtitle = document.getElementById('quizSubtitle');
var quizContent = document.getElementById('quizContent');
var results = document.getElementById('results');
var finalScore = document.getElementById('finalScore');
var finalPct = document.getElementById('finalPct');
var summary = document.getElementById('summary');
var restartBtn = document.getElementById('restartBtn');
var tabs = document.querySelectorAll('.tab');

function switchTab(tab) {
  if (tab === activeTab) return;
  // Save current state
  state[activeTab] = { currentIdx: currentIdx, answered: answered, quizDone: quizDone };
  // Load new state
  activeTab = tab;
  var s = state[tab];
  QUESTIONS = QUIZZES[tab];
  currentIdx = s.currentIdx;
  answered = s.answered;
  quizDone = s.quizDone;

  tabs.forEach(function(t) { t.classList.toggle('active', t.dataset.tab == tab); });
  quizTitle.textContent = TITLES[tab];
  quizSubtitle.textContent = SUBTITLES[tab];
  totalEl.textContent = TOTALS[tab];
  results.classList.remove('show');
  quizContent.classList.remove('hidden');
  updateScore();
  if (quizDone) {
    showResults();
  } else {
    renderQuestion();
  }
}

tabs.forEach(function(t) {
  t.addEventListener('click', function() { switchTab(parseInt(t.dataset.tab)); });
});

function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatText(s) {
  return (s || '').split(/<br>/gi).map(function(p) {
    return escapeHtml(p).replace(/`([^`]+)`/g, '<code>$1</code>');
  }).join('<br>');
}

function calcScore() {
  return answered.filter(function(a) { return a && a.correct; }).length;
}

function updateScore() {
  scoreEl.textContent = calcScore();
}

function renderQuestion() {
  if (quizDone) return;
  var q = QUESTIONS[currentIdx];
  var total = TOTALS[activeTab];
  qNum.textContent = 'Question ' + (currentIdx + 1) + ' of ' + total;
  qText.innerHTML = formatText(q.question);

  options.innerHTML = '';
  q.options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="label">' + opt.label + '</span><span>' + formatText(opt.text) + '</span>';
    btn.dataset.index = i;
    btn.addEventListener('click', function() { selectOption(i); });
    options.appendChild(btn);
  });

  feedback.classList.remove('show', 'correct', 'wrong');
  prevBtn.classList.remove('show');
  nextBtn.classList.remove('show');
  progressBar.style.width = ((currentIdx + 1) / total * 100) + '%';

  if (answered[currentIdx] !== undefined) {
    applyAnswerState();
  }
  if (currentIdx > 0) prevBtn.classList.add('show');
}

function applyAnswerState() {
  var s = answered[currentIdx];
  if (!s) return;
  var q = QUESTIONS[currentIdx];
  var btns = options.querySelectorAll('.option-btn');
  btns.forEach(function(btn, i) {
    btn.classList.remove('correct', 'wrong');
    if (q.options[i].label === q.answer_label) btn.classList.add('correct');
  });
  if (s.selectedLabel !== q.answer_label) {
    btns[s.selectedIdx].classList.add('wrong');
  }
  showFeedback(s.correct);
  var total = TOTALS[activeTab];
  nextBtn.textContent = (currentIdx === total - 1) ? 'Finish' : 'Next';
  nextBtn.classList.add('show');
}

function selectOption(idx) {
  var q = QUESTIONS[currentIdx];
  var btns = options.querySelectorAll('.option-btn');
  var selectedLabel = q.options[idx].label;
  var isCorrect = selectedLabel === q.answer_label;

  answered[currentIdx] = { selectedLabel: selectedLabel, selectedIdx: idx, correct: isCorrect };
  state[activeTab].answered = answered;

  btns.forEach(function(btn, i) {
    btn.classList.remove('correct', 'wrong');
    if (q.options[i].label === q.answer_label) btn.classList.add('correct');
  });
  if (!isCorrect) btns[idx].classList.add('wrong');

  updateScore();
  showFeedback(isCorrect);
  var total = TOTALS[activeTab];
  nextBtn.textContent = (currentIdx === total - 1) ? 'Finish' : 'Next';
  nextBtn.classList.add('show');
}

function showFeedback(isCorrect) {
  var q = QUESTIONS[currentIdx];
  feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  feedbackMsg.textContent = isCorrect ? 'Correct!' : 'Wrong!';
  feedbackAnswer.innerHTML = '<strong>Answer: ' + q.answer_label + ') </strong>' + formatText(q.answer);
}

prevBtn.addEventListener('click', function() {
  if (currentIdx > 0) { currentIdx--; state[activeTab].currentIdx = currentIdx; renderQuestion(); }
});

nextBtn.addEventListener('click', function() {
  var total = TOTALS[activeTab];
  if (currentIdx < total - 1) { currentIdx++; state[activeTab].currentIdx = currentIdx; renderQuestion(); }
  else { showResults(); }
});

function showResults() {
  quizDone = true;
  state[activeTab].quizDone = true;
  quizContent.classList.add('hidden');
  results.classList.add('show');
  progressBar.style.width = '100%';
  var s = calcScore();
  var total = TOTALS[activeTab];
  finalScore.textContent = s;
  var pct = Math.round(s / total * 100);
  finalPct.textContent = pct + '%';
  var html = '<h3 style="margin-bottom:12px">Review Answers</h3>';
  QUESTIONS.forEach(function(q, i) {
    var a = answered[i];
    var status = a && a.correct ? '\u2705' : '\u274C';
    var label = a ? a.selectedLabel : '-';
    var shortQ = q.question.replace(/<br>/gi, ' ').slice(0, 80);
    html += '<div class="summary-item"><span class="sq-status">' + status + '</span><span class="sq-num">Q' + (i+1) + ':</span> ' + escapeHtml(shortQ) + (q.question.replace(/<br>/gi, ' ').length > 80 ? '...' : '') + ' <em>(Your answer: ' + label + ', Correct: ' + q.answer_label + ')</em></div>';
  });
  summary.innerHTML = html;
}

restartBtn.addEventListener('click', function() {
  state[activeTab] = { currentIdx: 0, answered: [], quizDone: false };
  currentIdx = 0;
  answered = [];
  quizDone = false;
  scoreEl.textContent = '0';
  results.classList.remove('show');
  quizContent.classList.remove('hidden');
  renderQuestion();
});

renderQuestion();
</script>
</body>
</html>
